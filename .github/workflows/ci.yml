name: CMake CI


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:


env:
  BUILD_DIR: ${{ github.workspace }}/build


jobs:
  build:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.c_compiler }} / ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]
        c_compiler: [gcc, clang, cl]
        include:
          # Windows (MSVC)
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl

          # Linux GCC
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++

          # Linux Clang
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++

          # macOS (Apple Clang)
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          # Windows only supports MSVC here
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang

          # Linux/macOS don't support MSVC
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl

          # macOS doesn't have GCC by default
          - os: macos-latest
            c_compiler: gcc

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ env.BUILD_DIR }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ env.BUILD_DIR }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure
    
  
  asan:
    name: ASan (Ubuntu + Clang)
    runs-on: ubuntu-latest
    needs: build # Run ASan build after main build matrix passes. Skips ASan build if main build fails.

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure CMake (ASan)
      run: >
        cmake -B ${{ env.BUILD_DIR }}
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_BUILD_TYPE=Debug
        -DENABLE_ASAN=ON
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ env.BUILD_DIR }} --config Debug

    - name: Run Tests with ASan
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 \
        ctest --output-on-failure


  coverage:
    name: Code Coverage (Ubuntu + GCC)
    runs-on: ubuntu-latest
    needs: [build, asan] # Run coverage build after main build and ASan build passes. Skips coverage build if either main build or ASan build fails.

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install gcovr

    - name: Configure CMake
      run: >
        cmake -B ${{ env.BUILD_DIR }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Debug
        -DENABLE_COVERAGE=ON
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ env.BUILD_DIR }} --config Debug

    - name: Test
      working-directory: ${{ env.BUILD_DIR }}
      run: ctest --build-config Debug --output-on-failure

    - name: Generate Coverage
      run: cmake --build ${{ env.BUILD_DIR }} --target coverage

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ${{ github.workspace }}/coverage

    # - name: Deploy to GitHub Pages
    #   uses: peaceiris/actions-gh-pages@v3
    #   with:
    #     github_token: ${{ secrets.GITHUB_TOKEN }}
    #     publish_dir: ${{ github.workspace }}/coverage
    #     cname: coverage.stdads.com


  doxygen:
    name: Doxygen Documentation
    runs-on: ubuntu-latest
    needs: [build, asan] # Run coverage build after main build and ASan build passes. Skips coverage build if either main build or ASan build fails.

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Doxygen # NOTE: currently this installs an older version of Doxygen
      run: |
        sudo apt-get update -y
        sudo apt-get install -y doxygen

    - name: Generate Documentation
      run: |
        doxygen Doxyfile

    - name: Upload Documentation
      uses: actions/upload-artifact@v4
      with:
        name: doxygen-documentation
        path: docs/html

    # - name: Deploy to GitHub Pages
    #   uses: peaceiris/actions-gh-pages@v3
    #   with:
    #     github_token: ${{ secrets.GITHUB_TOKEN }}
    #     publish_dir: docs/html
    #     cname: docs.stdads.com
