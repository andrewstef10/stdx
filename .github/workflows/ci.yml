name: CMake CI


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:


env:
  BUILD_DIR: ${{ github.workspace }}/build


jobs:
  clang_tidy:
    name: Clang Tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang-tidy cmake ninja-build

      - name: Configure CMake
        run: >
          cmake -S ${{ github.workspace }}
          -B ${{ env.BUILD_DIR }}
          -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_COMPILER=clang
          -DENABLE_UNIT_TESTS=OFF

      - name: Run clang-tidy
        run: |
          run-clang-tidy \
            -p ${{ env.BUILD_DIR }} \
            src
  
  build:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.c_compiler }} / ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    needs: clang_tidy # Run build after clang-tidy succeeds

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations.
      fail-fast: false

      # Set up a matrix to run the following configurations:
      # 1. Windows, Debug/Release, MSVC
      # 2. Windows, Debug/Release, clang-cl
      # 3. Linux, Debug/Release, GCC
      # 4. Linux, Debug/Release, Clang
      # 5. MacOS, Debug/Release, Apple Clang
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
        compiler:
          - { c: gcc,       cpp: g++ }
          - { c: clang,     cpp: clang++ }
        include:
          # Windows (MSVC)
          - os: windows-latest
            build_type: Debug
            compiler: { c: cl, cpp: cl }

          - os: windows-latest
            build_type: Release
            compiler: { c: cl, cpp: cl }

          # Windows Clang (clang-cl)
          - os: windows-latest
            build_type: Debug
            compiler: { c: clang-cl, cpp: clang-cl }

          - os: windows-latest
            build_type: Release
            compiler: { c: clang-cl, cpp: clang-cl }

        exclude:
          # macOS doesn't have GCC by default
          - os: macos-latest
            compiler: { c: gcc, cpp: g++ }

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      run: >
        cmake -B ${{ env.BUILD_DIR }}
        -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cpp }}
        -DCMAKE_C_COMPILER=${{ matrix.compiler.c }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # NOTE: --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ env.BUILD_DIR }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure
    
  
  asan:
    name: ASan
    runs-on: ubuntu-latest
    needs: build # Run ASan build after main build matrix passes. Skips ASan build if main build fails.

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure CMake (ASan)
      run: >
        cmake -B ${{ env.BUILD_DIR }}
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_BUILD_TYPE=Debug
        -DENABLE_ASAN=ON
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ env.BUILD_DIR }} --config Debug

    - name: Run Tests with ASan
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 \
        ctest --output-on-failure


  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [build, asan] # Run coverage build after main build and ASan build passes. Skips coverage build if either main build or ASan build fails.

    # # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    # permissions:
    #   pages: write
    #   id-token: write

    # environment:
    #   name: github-pages

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: pip install gcovr

    - name: Configure CMake
      run: >
        cmake -B ${{ env.BUILD_DIR }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Debug
        -DENABLE_COVERAGE=ON
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ env.BUILD_DIR }} --config Debug

    - name: Test
      working-directory: ${{ env.BUILD_DIR }}
      run: ctest --build-config Debug --output-on-failure

    - name: Generate Coverage
      run: cmake --build ${{ env.BUILD_DIR }} --target coverage

    - name: Upload Coverage Report Artifact
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: ${{ github.workspace }}/coverage

    # - name: Upload Pages Artifact
    #   if: github.ref == 'refs/heads/main'
    #   uses: actions/upload-pages-artifact@v3
    #   with:
    #     path: ${{ github.workspace }}/coverage

    # - name: Deploy to GitHub Pages
    #   if: github.ref == 'refs/heads/main'
    #   uses: actions/deploy-pages@v4


  doxygen:
    name: Doxygen Documentation
    runs-on: ubuntu-latest
    needs: [build, asan] # Run coverage build after main build and ASan build passes. Skips coverage build if either main build or ASan build fails.

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Doxygen # NOTE: currently this installs an older version of Doxygen
      run: |
        sudo apt-get update -y
        sudo apt-get install -y doxygen

    - name: Generate Documentation
      run: |
        doxygen Doxyfile

    - name: Upload Documentation Artifact
      uses: actions/upload-artifact@v6
      with:
        name: doxygen-documentation
        path: docs/html

    # - name: Upload Pages Artifact
    #   if: github.ref == 'refs/heads/main'
    #   uses: actions/upload-pages-artifact@v3
    #   with:
    #     path: docs/html

    # - name: Deploy to GitHub Pages
    #   if: github.ref == 'refs/heads/main'
    #   uses: actions/deploy-pages@v4
