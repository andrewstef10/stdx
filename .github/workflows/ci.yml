name: CMake CI


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:


env:
  BUILD_DIR: ${{ github.workspace }}/build


jobs:
  clang_tidy:
    name: Clang Tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # - name: Install dependencies
      #   run: |
      #     sudo apt update
      #     sudo apt install -y clang-tidy cmake ninja-build

      - name: Configure CMake
        run: >
          cmake --preset clang-release -DENABLE_UNIT_TESTS=OFF -G Ninja

      - name: Run clang-tidy
        run: |
          run-clang-tidy \
            -p build/clang-release \
            src
  
  build:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    needs: clang_tidy # Run build after clang-tidy succeeds

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations.
      fail-fast: false

      # Set up a matrix to run the following configurations:
      # 1. Windows, Debug/Release, cl (uses VS multi config generator but is still split up for simplicity)
      # 2. Windows, Debug/Release, clang-cl
      # 3. Linux, Debug/Release, GCC
      # 4. Linux, Debug/Release, Clang
      # 5. MacOS, Debug/Release, Apple Clang
      matrix:
        os: [ubuntu-latest, macos-latest]
        preset: [clang-debug, clang-release, gcc-debug, gcc-release]
        include:
          # Windows (MSVC)
          - os: windows-latest
            preset: windows-cl-debug
          - os: windows-latest
            preset: windows-cl-release

          # Windows Clang (clang-cl)
          - os: windows-latest
            preset: windows-clang-debug
          - os: windows-latest
            preset: windows-clang-release

        exclude:
          # macOS doesn't have GCC by default
          - os: macos-latest
            preset: gcc-debug
          - os: macos-latest
            preset: gcc-release

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure CMake
      run: cmake --preset ${{ matrix.preset }}
        
    - name: Build
      run: cmake --build --preset ${{ matrix.preset }}

    - name: Test
      run: ctest --preset ${{ matrix.preset }}
    
  
  asan:
    name: ASan (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    needs: build # Run ASan build after main build matrix passes. Skips ASan build if main build fails.

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: clang
            preset: clang-asan

          - compiler: gcc
            preset: gcc-asan

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure CMake (ASan)
      run: cmake --preset ${{ matrix.preset }}

    - name: Build
      run: cmake --build --preset ${{ matrix.preset }}

    - name: Run Tests with ASan
      run: |
        ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 \
        ctest --preset ${{ matrix.preset }} --output-on-failure


  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [build, asan] # Run coverage build after main build and ASan build passes. Skips coverage build if either main build or ASan build fails.

    # # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    # permissions:
    #   pages: write
    #   id-token: write

    # environment:
    #   name: github-pages

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: pip install gcovr

    - name: Configure CMake
      run: cmake --preset gcc-coverage

    - name: Build
      run: cmake --build --preset gcc-coverage

    - name: Test
      run: ctest --preset gcc-coverage --output-on-failure

    - name: Generate Coverage
      run: cmake --build --preset gcc-coverage-gen-report

    - name: Upload Coverage Report Artifact
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: ${{ github.workspace }}/coverage

    # - name: Upload Pages Artifact
    #   if: github.ref == 'refs/heads/main'
    #   uses: actions/upload-pages-artifact@v3
    #   with:
    #     path: ${{ github.workspace }}/coverage

    # - name: Deploy to GitHub Pages
    #   if: github.ref == 'refs/heads/main'
    #   uses: actions/deploy-pages@v4


  doxygen:
    name: Doxygen Documentation
    runs-on: ubuntu-latest
    needs: [build, asan] # Run coverage build after main build and ASan build passes. Skips coverage build if either main build or ASan build fails.

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Doxygen # NOTE: currently this installs an older version of Doxygen
      run: |
        sudo apt-get update -y
        sudo apt-get install -y doxygen

    - name: Generate Documentation
      run: |
        doxygen Doxyfile

    - name: Upload Documentation Artifact
      uses: actions/upload-artifact@v6
      with:
        name: doxygen-documentation
        path: docs/html

    # - name: Upload Pages Artifact
    #   if: github.ref == 'refs/heads/main'
    #   uses: actions/upload-pages-artifact@v3
    #   with:
    #     path: docs/html

    # - name: Deploy to GitHub Pages
    #   if: github.ref == 'refs/heads/main'
    #   uses: actions/deploy-pages@v4
