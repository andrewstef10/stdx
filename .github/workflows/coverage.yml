name: Code Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install gcovr
        sudo apt-get update -y
        sudo apt-get install -y lcov

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ env.BUILD_DIR }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DENABLE_COVERAGE=ON
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration.
      run: cmake --build ${{ env.BUILD_DIR }} --config Release

    - name: Test
      working-directory: ${{ env.BUILD_DIR }}
      # Execute tests defined by the CMake configuration. See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config Release --output-on-failure

    - name: Generate Coverage
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        mkdir -p coverage
        gcovr -r ${{ github.workspace }} \
          --filter ${{ github.workspace }}/src \
          --filter ${{ github.workspace }}/include \
          --exclude ${{ github.workspace }}/tests \
          --exclude ${{ github.workspace }}/build/_deps \
          --exclude-throw-branches \
          --html \
          --html-details \
          --html-self-contained \
          --html-title "stdads Coverage Report" \
          -o coverage/index.html

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ${{ env.BUILD_DIR }}/coverage