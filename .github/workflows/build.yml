name: Build
on:
  workflow_call: {}

jobs:
  build:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.compiler.c }} / ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations.
      fail-fast: false

      # Set up a matrix to run the following configurations:
      # 1. Windows, Debug/Release, MSVC
      # 2. Windows, Debug/Release, clang-cl
      # 3. Linux, Debug/Release, GCC
      # 4. Linux, Debug/Release, Clang
      # 5. MacOS, Debug/Release, Apple Clang
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
        compiler:
          - { c: gcc,       cpp: g++ }
          - { c: clang,     cpp: clang++ }
        include:
          # Windows (MSVC)
          - os: windows-latest
            build_type: Debug
            compiler: { c: cl, cpp: cl }

          - os: windows-latest
            build_type: Release
            compiler: { c: cl, cpp: cl }

          # Windows Clang (clang-cl)
          - os: windows-latest
            build_type: Debug
            compiler: { c: clang-cl, cpp: clang-cl }

          - os: windows-latest
            build_type: Release
            compiler: { c: clang-cl, cpp: clang-cl }

        exclude:
          # macOS doesn't have GCC by default
          - os: macos-latest
            compiler: { c: gcc, cpp: g++ }

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      run: >
        cmake
        -S ${{ github.workspace }}
        -B ${{ env.BUILD_DIR }}
        -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cpp }}
        -DCMAKE_C_COMPILER=${{ matrix.compiler.c }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}


    - name: Build
      # NOTE: --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ env.BUILD_DIR }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure